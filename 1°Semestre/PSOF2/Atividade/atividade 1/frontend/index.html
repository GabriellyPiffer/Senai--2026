<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dália Lux</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>

<body>

    <header>

        <img width="70" id="logo"
            src="logoDL.png">

        <h1>Dália Lux</h1>

        <button onclick="cadastro.classList.remove('oculto')">
            Adicionar peça
        </button>

    </header>

    <main id="cards"></main>


    <div id="cadastro" class="modal oculto">

        <div class="janela">

            <h2>Adicionar peça</h2>

            <form id="formCad">

                <label>Nome</label>
                <input type="text" id="nome" required>

                <label>Categoria Joia:</label>
                <select id="tipo" required>
                    <option value="">Selecione...</option>
                    <option value="Brinco">Brinco</option>
                    <option value="Colar">Colar</option>
                    <option value="Pulseira">Pulseira</option>
                    <option value="Anel">Anel</option>
                </select>

                <label>URL da imagem</label>
                <input type="text" id="imagem">

                <label>Preço</label>
                <input type="number" step="0.01" id="preco">

                <label>Pedras</label>
                <input type="text" id="pedras">

                <label>Coleção</label>
                <input type="text" id="colecao">

                <br><br>

                <button type="reset" onclick="cadastro.classList.add('oculto')">
                    Cancelar
                </button>

                <button type="submit">
                    Salvar
                </button>

            </form>
        </div>
    </div>


    <div id="detalhes" class="modal oculto">

        <div class="janela">

            <h2 id="tituloReceita"></h2>

            <img id="imgReceita">

            <p><b>Nome</b></p>
            <input type="text" id="nomeEdit">

            <p><b>Imagem</b></p>
            <input type="text" id="imgEdit">

            <p><b>Preço</b></p>
            <input type="number" step="0.01" id="precoEdit">

            <p><b>Categoria</b></p>
            <select id="categoriaEdit">
                <option value="">Selecione...</option>
                <option value="Brinco">Brinco</option>
                <option value="Colar">Colar</option>
                <option value="Pulseira">Pulseira</option>
                <option value="Anel">Anel</option>
            </select>

            <p><b>Pedras</b></p>
            <input type="text" id="pedrasEdit">

            <p><b>Coleção</b></p>
            <input type="text" id="colecaoEdit">

            <br><br>

            <button onclick="salvarEdicao()">Salvar</button>
            <button onclick="excluirReceitaAtual()">Excluir</button>
            <button onclick="detalhes.classList.add('oculto')">Fechar</button>

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
