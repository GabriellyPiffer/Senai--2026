<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Minha Lojinha</title>
        <link rel="stylesheet" href="style.css"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    </head>
    <body>
        <nav class="navbar"> <!--Barra de Navegação-->
            <div class="logo">TechStore</div>
            <ul class="links">
                <li>Home</li>
                <li>Produtos</li>
            </ul>
        </nav>
        <header class="ofertas">
            <h1>As Melhores ofertas</h1>
        </header>
        <main class="container">
            <div class="grid-produtos">
                <div class="card">
                    <img src="https://imgs.casasbahia.com.br/55068806/1g.jpg?imwidth=500" alt="Produto">
                    <h3>Smartphone Motorola G55</h3>
                    <p>R$ 1.349,10</p>
                    <button class="btn-comprar">Comprar</button>
                </div>
                <div class="card">
                    <img src="https://m.media-amazon.com/images/I/71Z-rd+PWgL._AC_SX342_.jpg" alt="Produto">
                    <h3>Smartphone Apple iPhone 16 </h3>
                    <p>R$ 4.599,00</p>
                    <button class="btn-comprar">Comprar</button>
                </div>
            </div>
        </main>
    </body>
    <script src="script.js"></script>
</html>
